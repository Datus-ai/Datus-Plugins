# The whole plugin contract for `datus s3` — see the Datus plugin docs.
manifest_version: 1
description: "Browse and move S3 data (ls/stat/cat/cp/sync/rm/presign + S3 Select) from `datus s3`."

cli: datus_s3_plugin.cli:main
skills: skills
system_prompt: prompts/system.md.j2

# Read/list/preview/select/presign run everywhere; object writes (cp/sync/mv)
# are routine; deletes (rm) always require confirmation.
permissions:
  normal:
    allow:
      - "ls:*"
      - "stat:*"
      - "cat:*"
      - "head:*"
      - "presign:*"
      - "select:*"
      - "buckets list:*"
      - "buckets location:*"
    ask:
      - "cp:*"
      - "sync:*"
      - "mv:*"
      - "rm:*"
  auto:
    allow:
      - "ls:*"
      - "stat:*"
      - "cat:*"
      - "head:*"
      - "presign:*"
      - "select:*"
      - "buckets list:*"
      - "buckets location:*"
      - "cp:*"
      - "sync:*"
      - "mv:*"
    ask:
      - "rm:*"

config_schema:
  type: object
  properties:
    bucket:
      type: string
      description: "Default bucket for bare-key arguments"
    kms_key_id:
      type: string
      description: "SSE-KMS key id for object writes"
    region:
      type: string
      description: "AWS region"
    profile:
      type: string
      description: "AWS named profile in ~/.aws/config"
    access_key_id:
      type: string
      description: "Static AWS access key ID (omit to use the standard credential chain)"
    secret_access_key:
      type: string
      description: "AWS secret access key"
      x-secret: true
    session_token:
      type: string
      description: "AWS session token for temporary credentials"
      x-secret: true
    role_arn:
      type: string
      description: "IAM role ARN to assume (AssumeRole)"
    role_session_name:
      type: string
      description: "Session name for AssumeRole"
    external_id:
      type: string
      description: "ExternalId for AssumeRole"
    endpoint_url:
      type: string
      description: "Custom AWS endpoint URL (testing/VPC endpoints)"
    timeout:
      type: string
      description: "HTTP timeout in seconds"
      default: "60"
    max_attempts:
      type: string
      description: "Max boto3 retry attempts"
      default: "3"

# Descriptive CLI catalogue powering the '!s3' REPL completer (see plugin dev skill). Kept in sync with the permissions tree and cli/.
commands:
  - name: ls
    description: "List objects under an S3 prefix (or list buckets when no URI is given)"
    args:
      - {name: uri, description: "s3://bucket/prefix/ (omit to list buckets)"}
      - {name: --recursive, description: "Recurse into sub-prefixes"}
      - {name: --limit, description: "Maximum number of objects to list"}
  - name: stat
    description: "Show object metadata (HEAD)"
    args:
      - {name: uri, required: true, description: "s3://bucket/key of the object"}
  - name: cat
    description: "Print an object's contents to stdout"
    args:
      - {name: uri, required: true, description: "s3://bucket/key of the object"}
      - {name: --max-bytes, description: "Only fetch the first N bytes"}
  - name: head
    description: "Print the first lines of an object"
    args:
      - {name: uri, required: true, description: "s3://bucket/key of the object"}
      - {name: --lines, description: "Number of lines to print (default 10)"}
      - {name: --bytes, description: "Max bytes to fetch (default 64KiB)"}
  - name: presign
    description: "Generate a presigned URL for an object"
    args:
      - {name: uri, required: true, description: "s3://bucket/key of the object"}
      - {name: --method, description: "HTTP method: GET or PUT (default GET)"}
      - {name: --expires, description: "Seconds until expiry (default 3600)"}
  - name: select
    description: "Run an S3 Select SQL query over an object"
    args:
      - {name: uri, required: true, description: "s3://bucket/key of the object"}
      - {name: --sql, required: true, description: "S3 Select SQL, e.g. select * from s3object s limit 10"}
      - {name: --format, description: "Input format: csv, json or parquet (default csv)"}
  - name: buckets
    description: "List buckets and get a bucket's region"
    subcommands:
      - name: list
        description: "List all buckets"
      - name: location
        description: "Get a bucket's region"
        args:
          - {name: bucket, required: true, description: "Bucket name"}
  - name: cp
    description: "Copy between local and S3 (or S3 to S3)"
    args:
      - {name: src, required: true, description: "Source path or s3:// URI"}
      - {name: dst, required: true, description: "Destination path or s3:// URI"}
      - {name: --recursive, description: "Copy directories/prefixes recursively"}
  - name: sync
    description: "Upload a local directory to S3 (new/changed files only)"
    args:
      - {name: src, required: true, description: "Local source directory"}
      - {name: dst, required: true, description: "Destination s3:// URI"}
  - name: mv
    description: "Move (copy then delete source)"
    args:
      - {name: src, required: true, description: "Source path or s3:// URI"}
      - {name: dst, required: true, description: "Destination path or s3:// URI"}
      - {name: --recursive, description: "Move directories/prefixes recursively"}
  - name: rm
    description: "Delete object(s)"
    args:
      - {name: uri, required: true, description: "s3://bucket/key or prefix to delete"}
      - {name: --recursive, description: "Delete all objects under the prefix"}
      - {name: --yes, description: "Do not prompt for confirmation"}
