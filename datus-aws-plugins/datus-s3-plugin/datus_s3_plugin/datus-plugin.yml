# The whole plugin contract for `datus s3` — see the Datus plugin docs.
manifest_version: 1
description: "Browse and move S3 data (ls/stat/cat/cp/sync/rm/presign + S3 Select) from `datus s3`."

cli: datus_s3_plugin.cli:main
skills: skills
system_prompt: prompts/system.md.j2

# Read/list/preview/select/presign run everywhere; object writes (cp/sync/mv)
# are routine; deletes (rm) always require confirmation.
permissions:
  normal:
    allow:
      - "ls:*"
      - "stat:*"
      - "cat:*"
      - "head:*"
      - "presign:*"
      - "select:*"
      - "buckets list:*"
      - "buckets location:*"
    ask:
      - "cp:*"
      - "sync:*"
      - "mv:*"
      - "rm:*"
  auto:
    allow:
      - "ls:*"
      - "stat:*"
      - "cat:*"
      - "head:*"
      - "presign:*"
      - "select:*"
      - "buckets list:*"
      - "buckets location:*"
      - "cp:*"
      - "sync:*"
      - "mv:*"
    ask:
      - "rm:*"

config_schema:
  type: object
  properties:
    bucket:
      type: string
      description: "Default bucket for bare-key arguments"
    kms_key_id:
      type: string
      description: "SSE-KMS key id for object writes"
    region:
      type: string
      description: "AWS region"
    profile:
      type: string
      description: "AWS named profile in ~/.aws/config"
    access_key_id:
      type: string
      description: "Static AWS access key ID (omit to use the standard credential chain)"
    secret_access_key:
      type: string
      description: "AWS secret access key"
      x-secret: true
    session_token:
      type: string
      description: "AWS session token for temporary credentials"
      x-secret: true
    role_arn:
      type: string
      description: "IAM role ARN to assume (AssumeRole)"
    role_session_name:
      type: string
      description: "Session name for AssumeRole"
    external_id:
      type: string
      description: "ExternalId for AssumeRole"
    endpoint_url:
      type: string
      description: "Custom AWS endpoint URL (testing/VPC endpoints)"
    timeout:
      type: string
      description: "HTTP timeout in seconds"
      default: "60"
    max_attempts:
      type: string
      description: "Max boto3 retry attempts"
      default: "3"
