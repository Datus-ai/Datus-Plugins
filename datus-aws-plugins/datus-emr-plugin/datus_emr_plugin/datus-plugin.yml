# The whole plugin contract for `datus emr` — see the Datus plugin docs.
manifest_version: 1
description: "Submit and monitor steps on existing EMR (on EC2) clusters and read step logs from `datus emr`."

cli: datus_emr_plugin.cli:main
skills: skills
system_prompt: prompts/system.md.j2

# Cluster/step inspection and step logs run everywhere; cancelling a step is
# routine; adding a step (runs billed work) always confirms. Cluster
# provisioning is out of scope (use IaC).
permissions:
  normal:
    allow:
      - "clusters list:*"
      - "clusters describe:*"
      - "clusters instances:*"
      - "steps list:*"
      - "steps describe:*"
      - "steps logs:*"
    ask:
      - "steps cancel:*"
      - "steps add:*"
  auto:
    allow:
      - "clusters list:*"
      - "clusters describe:*"
      - "clusters instances:*"
      - "steps list:*"
      - "steps describe:*"
      - "steps logs:*"
      - "steps cancel:*"
    ask:
      - "steps add:*"

config_schema:
  type: object
  properties:
    cluster_id:
      type: string
      description: "Default EMR cluster id for `steps` commands"
    log_uri:
      type: string
      description: "S3 base URI for step logs (for `steps logs`)"
    region:
      type: string
      description: "AWS region"
    profile:
      type: string
      description: "AWS named profile in ~/.aws/config"
    access_key_id:
      type: string
      description: "Static AWS access key ID (omit to use the standard credential chain)"
    secret_access_key:
      type: string
      description: "AWS secret access key"
      x-secret: true
    session_token:
      type: string
      description: "AWS session token for temporary credentials"
      x-secret: true
    role_arn:
      type: string
      description: "IAM role ARN to assume (AssumeRole)"
    role_session_name:
      type: string
      description: "Session name for AssumeRole"
    external_id:
      type: string
      description: "ExternalId for AssumeRole"
    endpoint_url:
      type: string
      description: "Custom AWS endpoint URL (testing/VPC endpoints)"
    timeout:
      type: string
      description: "HTTP timeout in seconds"
      default: "60"
    max_attempts:
      type: string
      description: "Max boto3 retry attempts"
      default: "3"
