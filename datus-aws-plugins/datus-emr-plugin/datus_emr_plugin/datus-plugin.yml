# The whole plugin contract for `datus emr` — see the Datus plugin docs.
manifest_version: 1
description: "Submit and monitor steps on existing EMR (on EC2) clusters and read step logs from `datus emr`."

cli: datus_emr_plugin.cli:main
skills: skills
system_prompt: prompts/system.md.j2

# Cluster/step inspection and step logs run everywhere; cancelling a step is
# routine; adding a step (runs billed work) always confirms. Cluster
# provisioning is out of scope (use IaC).
permissions:
  normal:
    allow:
      - "clusters list:*"
      - "clusters describe:*"
      - "clusters instances:*"
      - "steps list:*"
      - "steps describe:*"
      - "steps logs:*"
    ask:
      - "steps cancel:*"
      - "steps add:*"
  auto:
    allow:
      - "clusters list:*"
      - "clusters describe:*"
      - "clusters instances:*"
      - "steps list:*"
      - "steps describe:*"
      - "steps logs:*"
      - "steps cancel:*"
    ask:
      - "steps add:*"

config_schema:
  type: object
  properties:
    cluster_id:
      type: string
      description: "Default EMR cluster id for `steps` commands"
    log_uri:
      type: string
      description: "S3 base URI for step logs (for `steps logs`)"
    region:
      type: string
      description: "AWS region"
    profile:
      type: string
      description: "AWS named profile in ~/.aws/config"
    access_key_id:
      type: string
      description: "Static AWS access key ID (omit to use the standard credential chain)"
    secret_access_key:
      type: string
      description: "AWS secret access key"
      x-secret: true
    session_token:
      type: string
      description: "AWS session token for temporary credentials"
      x-secret: true
    role_arn:
      type: string
      description: "IAM role ARN to assume (AssumeRole)"
    role_session_name:
      type: string
      description: "Session name for AssumeRole"
    external_id:
      type: string
      description: "ExternalId for AssumeRole"
    endpoint_url:
      type: string
      description: "Custom AWS endpoint URL (testing/VPC endpoints)"
    timeout:
      type: string
      description: "HTTP timeout in seconds"
      default: "60"
    max_attempts:
      type: string
      description: "Max boto3 retry attempts"
      default: "3"

# Descriptive CLI catalogue powering the '!emr' REPL completer (see plugin dev skill). Kept in sync with the permissions tree and the CLI.
commands:
  - name: clusters
    description: "EMR clusters: list, describe, instances"
    subcommands:
      - name: list
        description: "List EMR clusters, optionally filtered by state"
        args:
          - {name: --state, description: "Filter by cluster state (repeatable), e.g. WAITING RUNNING"}
          - {name: --limit, description: "Maximum number of clusters to return"}
      - name: describe
        description: "Describe one cluster"
        args:
          - {name: cluster_id, required: true, description: "EMR cluster id"}
      - name: instances
        description: "List a cluster's instances"
        args:
          - {name: cluster_id, required: true, description: "EMR cluster id"}
  - name: steps
    description: "EMR steps: list, describe, add, cancel, logs"
    subcommands:
      - name: list
        description: "List steps on a cluster, optionally filtered by state"
        args:
          - {name: cluster_id, required: true, description: "EMR cluster id"}
          - {name: --state, description: "Filter by step state (repeatable)"}
          - {name: --limit, description: "Maximum number of steps to return"}
      - name: describe
        description: "Describe one step"
        args:
          - {name: cluster_id, required: true, description: "EMR cluster id"}
          - {name: step_id, required: true, description: "Step id"}
      - name: logs
        description: "Read a step's stdout/stderr from S3 (needs log_uri)"
        args:
          - {name: cluster_id, required: true, description: "EMR cluster id"}
          - {name: step_id, required: true, description: "Step id"}
          - {name: --stderr, description: "Read stderr instead of stdout"}
      - name: cancel
        description: "Cancel a pending/running step"
        args:
          - {name: cluster_id, required: true, description: "EMR cluster id"}
          - {name: step_id, required: true, description: "Step id"}
      - name: add
        description: "Submit a step to a cluster (runs billed work)"
        args:
          - {name: cluster_id, description: "Cluster id (defaults to the profile's cluster_id)"}
          - {name: --name, required: true, description: "Step name"}
          - {name: --command, description: "Command run via command-runner.jar, e.g. 'spark-submit s3://b/job.py'"}
          - {name: --jar, description: "Path/URI of the JAR to run"}
          - {name: --arg, description: "Argument to the JAR (repeatable)"}
          - {name: --main-class, description: "Main class in the JAR"}
          - {name: --action-on-failure, description: "CONTINUE, CANCEL_AND_WAIT, or TERMINATE_CLUSTER"}
          - {name: --wait, description: "Poll until the step reaches a terminal state"}
