# The whole plugin contract for `datus iam` — see the Datus plugin docs.
manifest_version: 1
description: "Inspect AWS IAM (roles, users, policies) and simulate permissions read-only from `datus iam`."

cli: datus_iam_plugin.cli:main
skills: skills
system_prompt: prompts/system.md.j2

# Everything IAM exposes here is pure read-only diagnostics (Get*/List*,
# SimulatePrincipalPolicy, GetCallerIdentity) — there are no mutating commands —
# so every command is allowed under both `normal` and `auto`.
permissions:
  normal:
    allow:
      - "whoami:*"
      - "roles list:*"
      - "roles get:*"
      - "roles attached:*"
      - "roles trust:*"
      - "users list:*"
      - "users get:*"
      - "users attached:*"
      - "policies list:*"
      - "policies get:*"
      - "policies document:*"
      - "simulate principal:*"
      - "simulate custom:*"
    ask: []
  auto:
    allow:
      - "whoami:*"
      - "roles list:*"
      - "roles get:*"
      - "roles attached:*"
      - "roles trust:*"
      - "users list:*"
      - "users get:*"
      - "users attached:*"
      - "policies list:*"
      - "policies get:*"
      - "policies document:*"
      - "simulate principal:*"
      - "simulate custom:*"
    ask: []

config_schema:
  type: object
  properties:
    region:
      type: string
      description: "AWS region"
    profile:
      type: string
      description: "AWS named profile in ~/.aws/config"
    access_key_id:
      type: string
      description: "Static AWS access key ID (omit to use the standard credential chain)"
    secret_access_key:
      type: string
      description: "AWS secret access key"
      x-secret: true
    session_token:
      type: string
      description: "AWS session token for temporary credentials"
      x-secret: true
    role_arn:
      type: string
      description: "IAM role ARN to assume (AssumeRole)"
    role_session_name:
      type: string
      description: "Session name for AssumeRole"
    external_id:
      type: string
      description: "ExternalId for AssumeRole"
    endpoint_url:
      type: string
      description: "Custom AWS endpoint URL (testing/VPC endpoints)"
    timeout:
      type: string
      description: "HTTP timeout in seconds"
      default: "60"
    max_attempts:
      type: string
      description: "Max boto3 retry attempts"
      default: "3"

# Descriptive CLI catalogue powering the '!iam' REPL completer (see plugin dev skill). Kept in sync with the permissions tree and the CLI.
commands:
  - name: whoami
    description: "Show the current caller identity (STS GetCallerIdentity)."
  - name: roles
    description: "Inspect IAM roles: list, get, attached, trust."
    subcommands:
      - name: list
        description: "List IAM roles."
        args:
          - {name: --limit, description: "Maximum number of roles to return"}
      - name: get
        description: "Describe one role."
        args:
          - {name: name, required: true, description: "Role name"}
      - name: attached
        description: "List a role's attached managed policies."
        args:
          - {name: name, required: true, description: "Role name"}
      - name: trust
        description: "Show a role's trust (assume-role) policy."
        args:
          - {name: name, required: true, description: "Role name"}
  - name: users
    description: "Inspect IAM users: list, get, attached."
    subcommands:
      - name: list
        description: "List IAM users."
        args:
          - {name: --limit, description: "Maximum number of users to return"}
      - name: get
        description: "Describe one user."
        args:
          - {name: name, required: true, description: "User name"}
      - name: attached
        description: "List a user's attached managed policies."
        args:
          - {name: name, required: true, description: "User name"}
  - name: policies
    description: "Inspect IAM managed policies: list, get, document."
    subcommands:
      - name: list
        description: "List managed policies."
        args:
          - {name: --scope, description: "Policy scope: Local (default), AWS, or All"}
          - {name: --limit, description: "Maximum number of policies to return"}
      - name: get
        description: "Describe one policy by ARN."
        args:
          - {name: arn, required: true, description: "Policy ARN"}
      - name: document
        description: "Print a policy's default-version JSON document."
        args:
          - {name: arn, required: true, description: "Policy ARN"}
  - name: simulate
    description: "Simulate whether actions are allowed."
    subcommands:
      - name: principal
        description: "Simulate an existing principal's effective permissions."
        args:
          - {name: arn, required: true, description: "Principal ARN (role/user)"}
          - {name: --action, required: true, description: "Action to test, e.g. s3:GetObject (repeatable)"}
          - {name: --resource, description: "Resource ARN (repeatable; default '*')"}
      - name: custom
        description: "Simulate a standalone policy document."
        args:
          - {name: --policy, required: true, description: "Policy JSON document"}
          - {name: --action, required: true, description: "Action to test (repeatable)"}
          - {name: --resource, description: "Resource ARN (repeatable; default '*')"}
