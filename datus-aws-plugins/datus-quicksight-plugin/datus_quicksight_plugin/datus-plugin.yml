# The whole plugin contract for `datus quicksight` — see the Datus plugin docs.
manifest_version: 1
description: "Browse QuickSight datasets/dashboards/analyses and refresh SPICE ingestions from `datus quicksight`."

cli: datus_quicksight_plugin.cli:main
skills: skills
system_prompt: prompts/system.md.j2

# Reads/list/describe/permissions-get/embed/export run everywhere; SPICE refresh
# run/cancel are routine; every mutation
# (create/update/delete/publish/restore/permission-
# set/membership/schedule/import) confirms.
permissions:
  normal:
    allow:
      - "datasets list:*"
      - "datasets describe:*"
      - "datasets permissions:*"
      - "datasources list:*"
      - "datasources describe:*"
      - "dashboards list:*"
      - "dashboards describe:*"
      - "dashboards versions:*"
      - "dashboards permissions:*"
      - "dashboards embed-url:*"
      - "dashboards embed-url-anonymous:*"
      - "analyses list:*"
      - "analyses describe:*"
      - "templates list:*"
      - "templates describe:*"
      - "templates versions:*"
      - "themes list:*"
      - "themes describe:*"
      - "folders list:*"
      - "folders describe:*"
      - "folders members:*"
      - "users list:*"
      - "users describe:*"
      - "groups list:*"
      - "groups describe:*"
      - "groups members:*"
      - "namespaces list:*"
      - "namespaces describe:*"
      - "refresh list:*"
      - "refresh status:*"
      - "refresh schedules:*"
      - "account settings:*"
      - "account subscription:*"
      - "assets export:*"
      - "assets export-status:*"
      - "assets import-status:*"
    ask:
      - "refresh run:*"
      - "refresh cancel:*"
      - "datasets create:*"
      - "datasets update:*"
      - "datasets delete:*"
      - "datasets set-permissions:*"
      - "datasources create:*"
      - "datasources update:*"
      - "datasources delete:*"
      - "dashboards create:*"
      - "dashboards update:*"
      - "dashboards publish:*"
      - "dashboards delete:*"
      - "dashboards set-permissions:*"
      - "analyses create:*"
      - "analyses update:*"
      - "analyses delete:*"
      - "analyses restore:*"
      - "templates create:*"
      - "templates update:*"
      - "templates delete:*"
      - "themes create:*"
      - "themes update:*"
      - "themes delete:*"
      - "folders create:*"
      - "folders delete:*"
      - "folders member-add:*"
      - "folders member-remove:*"
      - "users register:*"
      - "users update:*"
      - "users delete:*"
      - "groups create:*"
      - "groups delete:*"
      - "groups member-add:*"
      - "groups member-remove:*"
      - "namespaces create:*"
      - "namespaces delete:*"
      - "refresh schedule-put:*"
      - "refresh schedule-delete:*"
      - "assets import:*"
  auto:
    allow:
      - "datasets list:*"
      - "datasets describe:*"
      - "datasets permissions:*"
      - "datasources list:*"
      - "datasources describe:*"
      - "dashboards list:*"
      - "dashboards describe:*"
      - "dashboards versions:*"
      - "dashboards permissions:*"
      - "dashboards embed-url:*"
      - "dashboards embed-url-anonymous:*"
      - "analyses list:*"
      - "analyses describe:*"
      - "templates list:*"
      - "templates describe:*"
      - "templates versions:*"
      - "themes list:*"
      - "themes describe:*"
      - "folders list:*"
      - "folders describe:*"
      - "folders members:*"
      - "users list:*"
      - "users describe:*"
      - "groups list:*"
      - "groups describe:*"
      - "groups members:*"
      - "namespaces list:*"
      - "namespaces describe:*"
      - "refresh list:*"
      - "refresh status:*"
      - "refresh schedules:*"
      - "account settings:*"
      - "account subscription:*"
      - "assets export:*"
      - "assets export-status:*"
      - "assets import-status:*"
      - "refresh run:*"
      - "refresh cancel:*"
    ask:
      - "datasets create:*"
      - "datasets update:*"
      - "datasets delete:*"
      - "datasets set-permissions:*"
      - "datasources create:*"
      - "datasources update:*"
      - "datasources delete:*"
      - "dashboards create:*"
      - "dashboards update:*"
      - "dashboards publish:*"
      - "dashboards delete:*"
      - "dashboards set-permissions:*"
      - "analyses create:*"
      - "analyses update:*"
      - "analyses delete:*"
      - "analyses restore:*"
      - "templates create:*"
      - "templates update:*"
      - "templates delete:*"
      - "themes create:*"
      - "themes update:*"
      - "themes delete:*"
      - "folders create:*"
      - "folders delete:*"
      - "folders member-add:*"
      - "folders member-remove:*"
      - "users register:*"
      - "users update:*"
      - "users delete:*"
      - "groups create:*"
      - "groups delete:*"
      - "groups member-add:*"
      - "groups member-remove:*"
      - "namespaces create:*"
