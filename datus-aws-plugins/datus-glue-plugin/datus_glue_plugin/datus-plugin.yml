# The whole plugin contract for `datus glue` — see the Datus plugin docs.
manifest_version: 1
description: "Browse the Glue Data Catalog and run/monitor Glue crawlers and ETL jobs from `datus glue`."

cli: datus_glue_plugin.cli:main
skills: skills
system_prompt: prompts/system.md.j2

# Catalog reads + crawler/job inspection run everywhere; crawler runs and job
# stops are routine (crawlers only touch metadata); running a job (writes data +
# billed) and any catalog mutation always require confirmation.
permissions:
  normal:
    allow:
      - "catalog databases:*"
      - "catalog tables:*"
      - "catalog show:*"
      - "catalog search:*"
      - "catalog partitions:*"
      - "catalog versions:*"
      - "catalog stats:*"
      - "crawlers list:*"
      - "crawlers get:*"
      - "crawlers status:*"
      - "crawlers history:*"
      - "crawlers metrics:*"
      - "jobs list:*"
      - "jobs get:*"
      - "jobs runs:*"
      - "jobs run-status:*"
      - "jobs logs:*"
      - "connections list:*"
      - "connections get:*"
    ask:
      - "crawlers run:*"
      - "crawlers stop:*"
      - "crawlers schedule-pause:*"
      - "crawlers schedule-resume:*"
      - "jobs stop:*"
      - "jobs bookmark-reset:*"
      - "jobs run:*"
      - "catalog create-database:*"
      - "catalog delete-database:*"
      - "catalog create-table:*"
      - "catalog update-table:*"
      - "catalog delete-table:*"
      - "catalog add-partition:*"
      - "catalog delete-partition:*"
  auto:
    allow:
      - "catalog databases:*"
      - "catalog tables:*"
      - "catalog show:*"
      - "catalog search:*"
      - "catalog partitions:*"
      - "catalog versions:*"
      - "catalog stats:*"
      - "crawlers list:*"
      - "crawlers get:*"
      - "crawlers status:*"
      - "crawlers history:*"
      - "crawlers metrics:*"
      - "jobs list:*"
      - "jobs get:*"
      - "jobs runs:*"
      - "jobs run-status:*"
      - "jobs logs:*"
      - "connections list:*"
      - "connections get:*"
      - "crawlers run:*"
      - "crawlers stop:*"
      - "crawlers schedule-pause:*"
      - "crawlers schedule-resume:*"
      - "jobs stop:*"
      - "jobs bookmark-reset:*"
    ask:
      - "jobs run:*"
      - "catalog create-database:*"
      - "catalog delete-database:*"
      - "catalog create-table:*"
      - "catalog update-table:*"
      - "catalog delete-table:*"
      - "catalog add-partition:*"
      - "catalog delete-partition:*"

config_schema:
  type: object
  properties:
    catalog_id:
      type: string
      description: "Cross-account Glue Data Catalog id (defaults to the caller's account)"
    region:
      type: string
      description: "AWS region"
    profile:
      type: string
      description: "AWS named profile in ~/.aws/config"
    access_key_id:
      type: string
      description: "Static AWS access key ID (omit to use the standard credential chain)"
    secret_access_key:
      type: string
      description: "AWS secret access key"
      x-secret: true
    session_token:
      type: string
      description: "AWS session token for temporary credentials"
      x-secret: true
    role_arn:
      type: string
      description: "IAM role ARN to assume (AssumeRole)"
    role_session_name:
      type: string
      description: "Session name for AssumeRole"
    external_id:
      type: string
      description: "ExternalId for AssumeRole"
    endpoint_url:
      type: string
      description: "Custom AWS endpoint URL (testing/VPC endpoints)"
    timeout:
      type: string
      description: "HTTP timeout in seconds"
      default: "60"
    max_attempts:
      type: string
      description: "Max boto3 retry attempts"
      default: "3"
