# The whole plugin contract for `datus emr-serverless` — see the Datus plugin docs.
manifest_version: 1
description: "Operate EMR Serverless applications and run/monitor Spark job runs from `datus emr-serverless`."

cli: datus_emr_serverless_plugin.cli:main
skills: skills
system_prompt: prompts/system.md.j2

# Application/job reads and the live Spark dashboard run everywhere;
# starting/stopping an application and cancelling a job run are routine; running
# a job (writes data + billed) always requires confirmation.
permissions:
  normal:
    allow:
      - "applications list:*"
      - "applications get:*"
      - "jobs list:*"
      - "jobs run-status:*"
      - "jobs dashboard:*"
    ask:
      - "applications start:*"
      - "applications stop:*"
      - "jobs cancel:*"
      - "jobs run:*"
  auto:
    allow:
      - "applications list:*"
      - "applications get:*"
      - "jobs list:*"
      - "jobs run-status:*"
      - "jobs dashboard:*"
      - "applications start:*"
      - "applications stop:*"
      - "jobs cancel:*"
    ask:
      - "jobs run:*"

config_schema:
  type: object
  properties:
    application_id:
      type: string
      description: "Default EMR Serverless application id"
    execution_role_arn:
      type: string
      description: "Default IAM execution role ARN for job runs"
    region:
      type: string
      description: "AWS region"
    profile:
      type: string
      description: "AWS named profile in ~/.aws/config"
    access_key_id:
      type: string
      description: "Static AWS access key ID (omit to use the standard credential chain)"
    secret_access_key:
      type: string
      description: "AWS secret access key"
      x-secret: true
    session_token:
      type: string
      description: "AWS session token for temporary credentials"
      x-secret: true
    role_arn:
      type: string
      description: "IAM role ARN to assume (AssumeRole)"
    role_session_name:
      type: string
      description: "Session name for AssumeRole"
    external_id:
      type: string
      description: "ExternalId for AssumeRole"
    endpoint_url:
      type: string
      description: "Custom AWS endpoint URL (testing/VPC endpoints)"
    timeout:
      type: string
      description: "HTTP timeout in seconds"
      default: "60"
    max_attempts:
      type: string
      description: "Max boto3 retry attempts"
      default: "3"

# Descriptive CLI catalogue powering the '!emr-serverless' REPL completer (see plugin dev skill). Kept in sync with the permissions tree and the CLI.
commands:
  - name: applications
    description: "Manage EMR Serverless applications."
    subcommands:
      - name: list
        description: "List EMR Serverless applications."
        args:
          - {name: --limit, description: "Maximum number of applications to return"}
          - {name: --output, description: "Output format: table (default), json, or yaml"}
      - name: get
        description: "Describe one EMR Serverless application."
        args:
          - {name: app_id, required: true, description: "Application id to describe"}
          - {name: --output, description: "Output format: table (default), json, or yaml"}
      - name: start
        description: "Start an application so it can run jobs."
        args:
          - {name: app_id, required: true, description: "Application id to start"}
      - name: stop
        description: "Stop an application."
        args:
          - {name: app_id, required: true, description: "Application id to stop"}
  - name: jobs
    description: "Run and monitor EMR Serverless Spark job runs."
    subcommands:
      - name: list
        description: "List job runs of an application."
        args:
          - {name: app_id, required: true, description: "Application id whose job runs to list"}
          - {name: --limit, description: "Maximum number of job runs to return"}
          - {name: --output, description: "Output format: table (default), json, or yaml"}
      - name: run-status
        description: "Show the status of one job run."
        args:
          - {name: app_id, required: true, description: "Application id"}
          - {name: run_id, required: true, description: "Job run id"}
          - {name: --output, description: "Output format: table (default), json, or yaml"}
      - name: dashboard
        description: "Get the live Spark UI URL for a job run."
        args:
          - {name: app_id, required: true, description: "Application id"}
          - {name: run_id, required: true, description: "Job run id"}
      - name: cancel
        description: "Cancel a running job run."
        args:
          - {name: app_id, required: true, description: "Application id"}
          - {name: run_id, required: true, description: "Job run id"}
      - name: run
        description: "Submit a Spark job run (writes data, billed)."
        args:
          - {name: app_id, description: "Application id (defaults to the profile's application_id)"}
          - {name: --entry-point, required: true, description: "Entry point, e.g. s3://bkt/job.py or a JAR"}
          - {name: --entry-point-args, description: "Entry point arguments as a JSON array"}
          - {name: --spark-submit-params, description: "Extra spark-submit parameters string"}
          - {name: --execution-role, description: "IAM role ARN (defaults to the profile's execution_role_arn)"}
          - {name: --name, description: "A name for the job run"}
          - {name: --wait, description: "Poll until the run reaches a terminal state"}
